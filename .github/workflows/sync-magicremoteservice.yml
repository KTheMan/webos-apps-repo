name: Sync MagicRemoteService

on:
  schedule:
    - cron: '0 */6 * * *'
  repository_dispatch:
    types: [update-magicremoteservice]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest manifest from MagicRemoteService-HBC
        run: |
          REPO="KTheMan/MagicRemoteService-HBC"
          RELEASE_DATA=$(curl -s https://api.github.com/repos/$REPO/releases/latest)

          # MagicRemoteService-HBC's own release build already generates a
          # correctly-versioned webosbrew manifest and attaches it as a
          # release asset - reuse it instead of re-deriving version/hash/size
          # here.
          MANIFEST_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name == "org.webosbrew.manifest.json") | .browser_download_url // empty')

          if [ -z "$MANIFEST_URL" ]; then
            echo "Could not find org.webosbrew.manifest.json asset in latest release"
            exit 1
          fi

          curl -sfL -o manifests/com.cathwyler.magicremoteservice.json "$MANIFEST_URL"

          # curl -f only errors on HTTP 4xx/5xx, not on a followed redirect
          # landing on an empty/unexpected body - verify we actually got
          # valid, non-empty JSON before it's allowed anywhere near a commit.
          if ! jq -e '.version and .ipkUrl' manifests/com.cathwyler.magicremoteservice.json > /dev/null; then
            echo "Downloaded manifest is missing or malformed:"
            cat manifests/com.cathwyler.magicremoteservice.json
            exit 1
          fi

      - name: Commit and push changes
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/com.cathwyler.magicremoteservice.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update MagicRemoteService manifest"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # A commit pushed with the default GITHUB_TOKEN doesn't trigger other
      # workflows' `on: push` (GitHub suppresses that to prevent infinite
      # workflow loops), so Site: Deploy wouldn't otherwise pick this up
      # until its own 3-hourly cron. Dispatch it explicitly instead.
      - name: Trigger site deploy
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/KTheMan/webos-apps-repo/actions/workflows/site-deploy.yml/dispatches \
            -d '{"ref":"main"}'
